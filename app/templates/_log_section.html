<hr class="my-4">
<div id="log-section" class="mb-3 card p-3">
    <h4>{{ _t('web.logs.heading') }}</h4>
    <p class="form-text">{{ _t('web.logs.description') }}</p>

    <!-- Log Type Selection and Controls -->
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <div class="d-flex align-items-center">
            <!-- Log Type Dropdown -->
            <div>
                <select id="logTypeSelect" class="form-select form-select-sm">
                    <option value="container" selected>{{ _t('web.logs.type_container') }}</option>
                    <option value="bot">{{ _t('web.logs.type_bot') }}</option>
                    <option value="discord">{{ _t('web.logs.type_discord') }}</option>
                    <option value="webui">{{ _t('web.logs.type_webui') }}</option>
                    <option value="application">{{ _t('web.logs.type_application') }}</option>
                    <option value="actions">{{ _t('web.logs.type_actions') }}</option>
                </select>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="d-flex align-items-center flex-wrap gap-2">
            <!-- Auto Refresh Toggle -->
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="autoRefreshToggle">
                <label class="form-check-label" for="autoRefreshToggle" style="font-size: 0.875rem;">
                    {{ _t('web.logs.auto_refresh') }}
                </label>
            </div>
            <button id="refreshLogsBtn" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-clockwise"></i> <span class="d-none d-sm-inline">{{ _t('web.common.refresh') }}</span>
            </button>
            <button id="downloadLogsBtn" class="btn btn-sm btn-outline-primary">
                <i class="bi bi-download"></i> <span class="d-none d-sm-inline">{{ _t('web.common.download') }}</span>
            </button>
            <button id="clearLogsBtn" class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash"></i> <span class="d-none d-sm-inline">{{ _t('web.common.clear') }}</span>
            </button>
        </div>
    </div>

    <!-- Debug Level Toggle -->
    <div class="row mb-3">
        <div class="col-md-12">
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="debugLevelToggle" name="debug_level_enabled" value="1" {% if config.debug_level_enabled %}checked{% endif %}>
                <label class="form-check-label" for="debugLevelToggle">{{ _t('web.logs.debug_level_label') }}</label>
            </div>
            <p class="form-text mt-1">{{ _t('web.logs.debug_level_help') }}</p>
        </div>
    </div>

    <!-- Log Display Area - Enhanced Design -->
    <div class="log-display-container">
        <div class="log-header d-flex justify-content-between align-items-center px-3 py-2">
            <span id="logTitle" class="fw-bold">{{ _t('web.logs.container_logs_title') }}</span>
            <small id="logTimestamp" class="text-muted"></small>
        </div>
        <div id="logsContainer" class="log-content-wrapper">
            <pre class="mb-0" id="logContent">{# Logs will be loaded here by JavaScript #}</pre>
        </div>
    </div>
    
    <style>
        .log-display-container {
            background: linear-gradient(145deg, #1a1d24, #0f1114);
            border: 1px solid #2a2d35;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .log-header {
            background: rgba(33, 37, 41, 0.8);
            border-bottom: 1px solid #2a2d35;
            color: #f8f9fa;
        }
        
        .log-content-wrapper {
            height: 450px;
            overflow-y: auto;
            overflow-x: auto;
            padding: 1rem;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #e9ecef;
            background: #0d0f12;
            position: relative;
        }
        
        .log-content-wrapper::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        
        .log-content-wrapper::-webkit-scrollbar-track {
            background: #1a1d24;
            border-radius: 5px;
        }
        
        .log-content-wrapper::-webkit-scrollbar-thumb {
            background: #495057;
            border-radius: 5px;
        }
        
        .log-content-wrapper::-webkit-scrollbar-thumb:hover {
            background: #6c757d;
        }
        
        #logContent {
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            padding: 0;
            transition: opacity 0.3s ease;
        }
        
        /* Smooth update animation */
        .log-updating {
            opacity: 0.7;
        }
        
        /* Auto-refresh indicator */
        .auto-refresh-active .log-header {
            position: relative;
        }
        
        .auto-refresh-active .log-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            width: 100%;
            background: linear-gradient(90deg, transparent, #28a745, transparent);
            animation: slideIndicator 2s linear infinite;
        }
        
        @keyframes slideIndicator {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</div>
{# --- End log display --- #}
