<!-- Channel Translation - Pair Editor Modal -->
<div class="modal fade" id="ctPairEditorModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg">
        <div class="modal-content bg-dark text-light">
            <div class="modal-header">
                <h5 class="modal-title" id="ctPairEditorTitle"><i class="bi bi-arrow-left-right"></i> {{ _t('web.ct.new_pair') }}</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="ctPairForm">
                    <input type="hidden" id="ctPairId" value="">

                    <!-- Basic Info -->
                    <div class="mb-3">
                        <label class="form-label">{{ _t('web.ct.pair_name') }}</label>
                        <input type="text" class="form-control" id="ctPairName" placeholder="{{ _t('web.ct.pair_name_placeholder') }}" maxlength="100" required>
                    </div>

                    <div class="row g-3">
                        <!-- Source Channel -->
                        <div class="col-md-6">
                            <label class="form-label">{{ _t('web.ct.source_channel_id') }}</label>
                            <input type="text" class="form-control" id="ctSourceChannelId" placeholder="{{ _t('web.ct.discord_channel_id_placeholder') }}" required>
                            <div class="form-text">{{ _t('web.ct.source_channel_hint') }}</div>
                        </div>

                        <!-- Target Channel -->
                        <div class="col-md-6">
                            <label class="form-label">{{ _t('web.ct.target_channel_id') }}</label>
                            <input type="text" class="form-control" id="ctTargetChannelId" placeholder="{{ _t('web.ct.discord_channel_id_placeholder') }}" required>
                            <div class="form-text">{{ _t('web.ct.target_channel_hint') }}</div>
                        </div>

                        <!-- Target Language -->
                        <div class="col-md-6">
                            <label class="form-label">{{ _t('web.ct.target_language') }}</label>
                            <select class="form-select" id="ctTargetLanguage">
                                <!-- Populated by JS -->
                            </select>
                        </div>

                        <!-- Source Language -->
                        <div class="col-md-6">
                            <label class="form-label">{{ _t('web.ct.source_language') }}</label>
                            <select class="form-select" id="ctSourceLanguage">
                                <option value="">{{ _t('web.ct.auto_detect') }}</option>
                                <!-- Additional options populated by JS -->
                            </select>
                        </div>

                        <!-- Options -->
                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="ctTranslateEmbeds" checked>
                                <label class="form-check-label" for="ctTranslateEmbeds">
                                    {{ _t('web.ct.translate_embeds') }}
                                </label>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="ctPairEnabled" checked>
                                <label class="form-check-label" for="ctPairEnabled">{{ _t('web.common.enabled') }}</label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{{ _t('web.common.cancel') }}</button>
                <button type="button" class="btn btn-danger me-auto" id="ctDeletePairBtn" style="display:none;" onclick="deleteCTPair()">
                    <i class="bi bi-trash"></i> {{ _t('web.common.delete') }}
                </button>
                <button type="button" class="btn btn-primary" onclick="saveCTPair()">
                    <i class="bi bi-save"></i> {{ _t('web.ct.save_pair') }}
                </button>
            </div>
        </div>
    </div>
</div>
